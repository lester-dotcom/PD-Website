title: "AI in Paid Media"
metaDescription: "How Pratt Digital uses AI tools in campaign management, and how we're approaching emerging AI advertising channels including OpenAI Ads."
hero:
  eyebrow: "AI"
  title: "AI in Paid Media: A Tool, Not a Replacement for Judgement"
  description: "We use AI tools to work faster and see more, but every recommendation still passes through a specialist before it touches your budget. Here's how we use AI today, and how we're thinking about AI-native ad platforms."
blocks:
  - type: featureGrid
    columns: 2
    cardStyle: bordered
    background: slate
    items:
      - title: "Creative variation at speed"
        description: "AI tools help us produce and test more ad copy and creative variants than would be practical manually, though the specialist still decides what actually ships."
        icon: sparkles
        color: green
      - title: "Faster account analysis"
        description: "Surfacing patterns across large accounts quickly, so more time goes into deciding what to do about them rather than digging for them."
        icon: chart
        color: orange
      - title: "Reporting, not busywork"
        description: "Automating the repetitive parts of reporting frees up time for the analysis clients actually want to talk about."
        icon: layers
        color: green
      - title: "Human judgement stays in charge"
        description: "AI recommendations and automation are checked against your commercial goals before anything touches live spend, the same standard we hold platform automation to."
        icon: shield
        color: orange
  - type: text
    background: gray
    heading: "OpenAI Ads and AI-native platforms"
    body: |-
      Advertising is expanding beyond search and social into AI assistants themselves, including OpenAI's advertising products within ChatGPT. These platforms work differently to the auctions we're used to on Google and Meta, and the audience is reached through conversation rather than a results page or a feed.

      We're evaluating and testing these channels as they open up, the same way we'd assess any new platform: on merit, for the clients whose audience and product genuinely fit, not as a blanket recommendation because it's new. If you want to know whether an AI-native channel makes sense for your account, that's a conversation we're happy to have.
  - type: cta
    title: "Curious how AI fits into your account?"
    description: "Get in touch and we'll talk through where AI tools genuinely help, and where they don't."
