backend:
  name: git-gateway
  branch: main

# Netlify Identity + Git Gateway handles auth once this site is deployed on
# Netlify with Identity enabled. See README.md "Connecting Decap CMS" section.

publish_mode: editorial_workflow
media_folder: "src/assets/blog"
public_folder: "/src/assets/blog"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Publish Date", name: "pubDate", widget: "datetime" }
      - { label: "Updated Date", name: "updatedDate", widget: "datetime", required: false }
      - label: "Tags"
        name: "tags"
        widget: "list"
        default: ["Paid Search"]
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "pages"
    label: "Pages"
    files:
      - name: "for-agencies"
        label: "For Agencies"
        file: "src/content/pages/for-agencies.yaml"
        fields:
          - { label: "Browser Tab Title", name: "title", widget: "string" }
          - { label: "Meta Description (SEO)", name: "metaDescription", widget: "text" }
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string", required: false }
              - { label: "Heading", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - label: "Content Blocks"
            name: "blocks"
            widget: "list"
            types:
              - label: "Feature Grid"
                name: "featureGrid"
                widget: "object"
                summary: "Feature Grid ({{fields.items}} cards)"
                fields:
                  - label: "Cards"
                    name: "items"
                    widget: "list"
                    summary: "{{title}}"
                    fields:
                      - { label: "Title", name: "title", widget: "string" }
                      - { label: "Description", name: "description", widget: "text" }
                      - label: "Icon"
                        name: "icon"
                        widget: "select"
                        options:
                          [
                            "search", "share", "users", "graduation-cap", "sparkles", "chart",
                            "megaphone", "pin", "briefcase", "chat", "target", "layers", "shield",
                            "compass", "hashtag", "heart", "arrow-forward", "instagram", "youtube",
                            "eye", "thumbsup", "gear",
                          ]
                      - label: "Colour"
                        name: "color"
                        widget: "select"
                        options: ["green", "orange"]
              - label: "CTA Banner"
                name: "cta"
                widget: "object"
                summary: "CTA: {{fields.title}}"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
              - label: "Text Section"
                name: "text"
                widget: "object"
                summary: "Text: {{fields.heading}}"
                fields:
                  - { label: "Heading", name: "heading", widget: "string", required: false }
                  - { label: "Body", name: "body", widget: "text" }
